version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cvniche-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cvniche
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cvniche-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cvniche"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cvniche-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cvniche-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  cvniche-net:
    driver: bridge
